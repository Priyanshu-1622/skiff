name: Marketing — Daily Report

on:
  schedule:
    - cron: "0 9 * * *"   # 9 AM UTC every day (2:30 PM IST)
  workflow_dispatch:       # Also allows manual trigger from GitHub Actions tab

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily marketing agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python run_daily_report.py

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketing-report-${{ github.run_id }}
          path: marketing_report.md
          retention-days: 30
