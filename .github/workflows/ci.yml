name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Native modules (better-sqlite3, argon2, ssh2) compile here because
      # pnpm-workspace.yaml allows their build scripts.
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: API integration tests
        run: pnpm --filter @skiff/api test

      - name: Build
        run: pnpm build
