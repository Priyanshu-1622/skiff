<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Skiff</title>

    <!-- Inter + JetBrains Mono via Bunny Fonts (privacy-respecting, no Google) -->
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link
      href="https://fonts.bunny.net/css?family=inter:400,500,600,700|jetbrains-mono:400,500,600&display=swap"
      rel="stylesheet"
    />

    <!-- Set theme before React mounts to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("skiff:theme");
          var theme = saved || "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
